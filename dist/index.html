<title>Faktagranskaren — källspårad bevakning av politiska ärenden i Alingsås</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --paper:#EEEBE2;
    --paper-dim:#E4E0D2;
    --white:#FBFAF6;
    --ink:#20241F;
    --ink-soft:#565F53;
    --ink-faint:#8B9186;
    --verified:#2F6E5C;
    --verified-bg:#DCE7DF;
    --flag:#9C4B2E;
    --flag-bg:#F1E1D8;
    --gold:#A97D2E;
    --gold-bg:#F0E6D2;
    --line:#C7C2AE;
    --line-soft:#DAD6C7;
    --radius:3px;
    --shadow-card: 0 1px 0 rgba(32,36,31,0.05), 0 1px 3px rgba(32,36,31,0.06);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', serif;
    font-size:17px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background: var(--gold-bg); }
  a{ color:inherit; }
  .ui{ font-family:'Inter', sans-serif; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  .display{ font-family:'Fraunces', serif; }

  header.site{
    position:sticky; top:0; z-index:50;
    background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  .header-inner{
    max-width:1000px; margin:0 auto; padding:18px 24px;
    display:flex; align-items:baseline; justify-content:space-between; gap:16px;
    flex-wrap:wrap;
  }
  .wordmark{
    font-family:'Fraunces', serif; font-weight:900; font-size:1.5rem;
    letter-spacing:-0.01em; text-decoration:none; color:var(--ink);
    cursor:pointer; display:flex; align-items:baseline; gap:10px;
  }
  .wordmark .dot{ color:var(--verified); }
  .byline{
    font-family:'Inter', sans-serif; font-size:0.68rem; font-weight:600;
    letter-spacing:0.09em; text-transform:uppercase; color:var(--ink-soft);
    text-align:right;
  }
  nav.site{
    max-width:1000px; margin:0 auto; padding:0 24px 14px;
    display:flex; gap:22px; font-family:'Inter',sans-serif; font-size:0.82rem;
    font-weight:600; color:var(--ink-soft);
  }
  nav.site a{ text-decoration:none; cursor:pointer; padding-bottom:2px; border-bottom:2px solid transparent; }
  nav.site a.active{ color:var(--ink); border-bottom-color:var(--verified); }
  nav.site a:hover{ color:var(--ink); }

  main{ max-width:1000px; margin:0 auto; padding:40px 24px 100px; }

  .hero{ padding: 8px 0 36px; border-bottom:1px solid var(--line); margin-bottom:28px; }
  .hero h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:2.15rem;
    line-height:1.18; margin:0 0 14px; max-width:30ch; letter-spacing:-0.01em;
  }
  .hero p.lede{
    max-width:58ch; color:var(--ink-soft); font-size:1.05rem; margin:0 0 22px;
  }
  .method-strip{
    display:flex; gap:0; border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; background:var(--white);
  }
  .method-strip .cell{
    flex:1; padding:14px 18px; border-right:1px solid var(--line-soft);
  }
  .method-strip .cell:last-child{ border-right:none; }
  .method-strip .num{
    font-family:'Fraunces', serif; font-weight:600; font-size:1.5rem; color:var(--verified);
    display:block; line-height:1;
  }
  .method-strip .label{
    font-family:'Inter', sans-serif; font-size:0.72rem; color:var(--ink-soft);
    letter-spacing:0.02em; margin-top:5px; display:block;
  }

  .filter-group{ margin-bottom:14px; }
  .filter-group-label{
    font-family:'Inter', sans-serif; font-size:0.66rem; font-weight:700;
    letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-faint);
    margin-bottom:8px; display:block;
  }
  .filters{
    display:flex; flex-wrap:wrap; gap:8px;
    font-family:'Inter', sans-serif; font-size:0.78rem;
  }
  .filters button{
    font-family:inherit; font-size:inherit; font-weight:600;
    background:var(--white); border:1px solid var(--line); color:var(--ink-soft);
    padding:7px 13px; border-radius:100px; cursor:pointer;
    transition:all .12s ease;
    display:inline-flex; align-items:center; gap:6px;
  }
  .filters button .swatch{
    width:8px; height:8px; border-radius:50%; display:inline-block;
  }
  .filters button:hover{ border-color:var(--ink-soft); color:var(--ink); }
  .filters button.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .filters button.active .swatch{ background:var(--paper) !important; }
  .filters button .count{ color:var(--ink-faint); font-weight:400; }
  .filters button.active .count{ color:var(--paper); opacity:0.7; }

  .filter-note{
    font-family:'Inter', sans-serif; font-size:0.76rem; color:var(--ink-faint);
    margin:10px 0 24px; line-height:1.5; max-width:64ch;
  }

  .arende-list{ display:flex; flex-direction:column; gap:14px; }
  .arende-card{
    background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px 22px; cursor:pointer; box-shadow:var(--shadow-card);
    transition:border-color .12s ease, transform .12s ease;
    text-decoration:none; color:inherit; display:block;
  }
  .arende-card:hover{ border-color:var(--verified); transform:translateY(-1px); }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:8px;}
  .eyebrow-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .eyebrow{
    font-family:'Inter', sans-serif; font-size:0.7rem; font-weight:600;
    letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-faint);
  }
  .type-tag{
    font-family:'Inter', sans-serif; font-size:0.68rem; font-weight:700;
    letter-spacing:0.03em; padding:2px 9px 2px 7px; border-radius:100px;
    display:inline-flex; align-items:center; gap:5px; border:1px solid currentColor;
  }
  .type-tag .swatch{ width:7px; height:7px; border-radius:50%; background:currentColor; display:inline-block; }
  .arende-card h3{
    font-family:'Fraunces', serif; font-weight:600; font-size:1.28rem; margin:6px 0 10px;
    line-height:1.28;
  }
  .stamp{
    font-family:'IBM Plex Mono', monospace; font-size:0.66rem; font-weight:600;
    letter-spacing:0.06em; text-transform:uppercase;
    padding:4px 9px; border-radius:2px; white-space:nowrap;
    transform:rotate(-2deg); display:inline-block; border:1.5px solid currentColor;
  }
  .stamp.avgjort{ color:var(--verified); background:var(--verified-bg); }
  .stamp.pagaende{ color:var(--gold); background:var(--gold-bg); }

  .initiators{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; align-items:center; }
  .party-pill{
    font-family:'Inter', sans-serif; font-size:0.72rem; font-weight:600;
    display:inline-flex; align-items:center; gap:5px; color:var(--ink-soft);
  }
  .party-pill .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
  .no-initiators{
    font-family:'Inter', sans-serif; font-size:0.72rem; font-style:italic; color:var(--ink-faint);
  }
  .meta-row{
    display:flex; gap:16px; font-family:'IBM Plex Mono', monospace; font-size:0.74rem;
    color:var(--ink-faint); flex-wrap:wrap;
  }

  .back-link{
    font-family:'Inter', sans-serif; font-size:0.8rem; font-weight:600; color:var(--ink-soft);
    text-decoration:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
    margin-bottom:20px;
  }
  .back-link:hover{ color:var(--ink); }
  .detail-head{ margin-bottom:30px; }
  .detail-head h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:2rem; line-height:1.2;
    margin:10px 0 14px; letter-spacing:-0.01em;
  }
  .detail-meta{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:14px; }

  .timeline{ position:relative; margin-top:8px; }
  .timeline::before{
    content:''; position:absolute; left:9px; top:8px; bottom:8px; width:2px;
    background:var(--line);
  }
  .step{ position:relative; padding:0 0 34px 40px; }
  .step:last-child{ padding-bottom:4px; }
  .step::before{
    content:''; position:absolute; left:2px; top:4px; width:16px; height:16px;
    border-radius:50%; background:var(--paper); border:2.5px solid var(--verified);
  }
  .step-head{ margin-bottom:10px; }
  .step-instance{
    font-family:'Inter', sans-serif; font-weight:700; font-size:0.95rem; color:var(--ink);
  }
  .step-meta{
    font-family:'IBM Plex Mono', monospace; font-size:0.74rem; color:var(--ink-faint);
    margin-top:2px;
  }

  .quote-block{
    background:var(--white); border:1px solid var(--line-soft); border-left:3px solid var(--verified);
    border-radius:0 var(--radius) var(--radius) 0; padding:16px 18px; margin:10px 0 12px;
  }
  .quote-block blockquote{
    margin:0 0 12px; font-family:'IBM Plex Mono', monospace; font-size:0.9rem;
    line-height:1.65; color:var(--ink);
  }
  .quote-block blockquote::before{ content:'"'; color:var(--ink-faint); }
  .quote-block blockquote::after{ content:'"'; color:var(--ink-faint); }
  .verify-row{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .verify-stamp{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'IBM Plex Mono', monospace; font-size:0.66rem; font-weight:600;
    letter-spacing:0.05em; text-transform:uppercase; color:var(--verified);
    border:1.5px solid var(--verified); padding:3px 9px 3px 7px; border-radius:2px;
    transform:rotate(-1.5deg);
  }
  .verify-stamp svg{ width:11px; height:11px; }
  .source-links{ display:flex; gap:14px; font-family:'Inter', sans-serif; font-size:0.74rem; }
  .source-links a{ color:var(--ink-soft); text-decoration:underline; text-underline-offset:2px; }
  .source-links a:hover{ color:var(--ink); }

  .decision-row{
    display:flex; align-items:center; gap:10px; margin:10px 0; flex-wrap:wrap;
  }
  .decision-tag{
    font-family:'Inter', sans-serif; font-weight:700; font-size:0.82rem;
    padding:3px 11px; border-radius:100px;
  }
  .decision-tag.bifall,.decision-tag.tillstyrker{ background:var(--verified-bg); color:var(--verified); }
  .decision-tag.avslag,.decision-tag.avstyrker{ background:var(--flag-bg); color:var(--flag); }
  .decision-tag.delvis,.decision-tag.besvarad,.decision-tag.neutral{ background:var(--gold-bg); color:var(--gold); }

  .voting-box{
    font-family:'Inter', sans-serif; font-size:0.82rem; background:var(--paper-dim);
    border:1px solid var(--line-soft); border-radius:var(--radius); padding:12px 16px; margin:10px 0;
  }
  .voting-box .q{ color:var(--ink-soft); font-size:0.78rem; margin-bottom:8px; }
  .voting-tally{ display:flex; gap:18px; font-family:'IBM Plex Mono', monospace; font-weight:600; }
  .voting-tally span.n{ font-size:1.1rem; }
  .voting-tally .ja{ color:var(--verified); }
  .voting-tally .nej{ color:var(--flag); }
  .voting-note{ color:var(--ink-faint); font-style:italic; font-size:0.8rem; }
  .no-decision-note{
    font-family:'Inter', sans-serif; font-size:0.78rem; color:var(--ink-faint); font-style:italic;
    margin:10px 0;
  }

  .aside-block{
    border-left:2px solid var(--line); padding:9px 0 9px 14px; margin:10px 0;
    font-size:0.92rem; color:var(--ink-soft);
  }
  .aside-block .tag{
    font-family:'Inter', sans-serif; font-weight:700; font-size:0.68rem;
    text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; display:block;
  }
  .aside-block.reservation .tag{ color:var(--flag); }
  .aside-block.anteckning .tag{ color:var(--ink-faint); }
  .aside-block q{ font-style:italic; }

  footer.site{
    border-top:1px solid var(--line); margin-top:60px; padding:28px 24px;
    max-width:1000px; margin-left:auto; margin-right:auto;
    font-family:'Inter', sans-serif; font-size:0.78rem; color:var(--ink-faint);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  footer.site a{ color:var(--ink-soft); text-decoration:none; }
  footer.site a:hover{ text-decoration:underline; }

  .empty-note{
    font-family:'Inter', sans-serif; color:var(--ink-faint); font-size:0.85rem;
    padding:30px 0; text-align:center;
  }

  @media (max-width:640px){
    .hero h1{ font-size:1.6rem; }
    .method-strip{ flex-direction:column; }
    .method-strip .cell{ border-right:none; border-bottom:1px solid var(--line-soft); }
    .method-strip .cell:last-child{ border-bottom:none; }
  }

  :focus-visible{ outline:2px solid var(--verified); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    *{ transition:none !important; }
  }
</style>
</head>

6 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}},{"step_id":"ks-96-namndyttrande","instance":"kommunstyrelsen","type":"namndyttrande","date":"2024-06-03","quote":"Kommunledningskontoret anser att motionärens förslag redan är uppfyllt, då socialförvaltningen har tillgång till förturslägenheter som fördelas efter prövning, bland annat till de våldsutsatta kvinnor som innan erbjudits tillfälligt boende av kvinnojouren Olivia. Det finns även en pågående dialog med Alingsåshem och privata fastighetsägare. Kommunledningskontoret föreslår därmed att motionen kan anses besvarad.","decision":"besvarad","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§96 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}},{"step_id":"ks-96-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2024-06-03","quote":"Ordföranden ställer förslagen mot varandra och finner att kommunstyrelsen beslutar att bifalla arbetsutskottets förslag.","decision":"besvarad","voting":{"recorded":false,"note":"Röstfördelning ej redovisad i protokollet"},"reservations":[{"parties":["c"],"quote":"Centerpartiet vill bifalla motionen att kommunen ska utveckla sitt samarbete med Kvinnojouren och Tjejjouren Olivia så att Alingsåshem kan ge våldsutsatta kvinnor förtur till bostad. Förturslägenheter kanske finns i teorin men för våldsutsatta kvinnor på Olivia fungerar det inte i praktiken så som det beskrivs i tjänsteskrivelsen."}],"protocol_anteckning":[],"source":{"protocol_ref":"§96 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}}],"id":"a-2024-0026"},{"title":"Fördjupad månadsuppföljning 2024 för Alingsås kommun","initiativ_typ":"styrelseforslag","initiators":[],"category":"ekonomi","status":"avgjort","diarienummer":"2024.016 KS","steps":[{"step_id":"ks-97-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2024-06-03","quote":"Fördjupad månadsuppföljning 2024 för Alingsås kommun godkänns.","decision":"bifall","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§97 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}}],"id":"a-2024-0027"},{"title":"Fördjupad månadsuppföljning 2024 för kommunstyrelsen","initiativ_typ":"styrelseforslag","initiators":[],"category":"ekonomi","status":"avgjort","diarienummer":"2024.022 KS","steps":[{"step_id":"ks-98-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2024-06-03","quote":"Fördjupad månadsuppföljning 2024 för kommunstyrelsen godkänns.","decision":"bifall","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§98 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}}],"id":"a-2024-0028"},{"title":"Ansökan om investeringsbidrag gällande inköp av traktor - Alingsås Ryttarsällskap","initiativ_typ":"styrelseforslag","initiators":[],"category":"ekonomi","status":"avgjort","diarienummer":"2024.204 KS","steps":[{"step_id":"ks-100-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2024-06-03","quote":"Ansökan avslås.","decision":"avslag","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§100 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}}],"id":"a-2024-0029"},{"title":"Detaljplan för Ingared, Förskola, vid Kärrbogärdevägen (del av fastigheten Ingared 5:114), samråd","initiativ_typ":"styrelseforslag","initiators":[],"category":"barn-utbildning","status":"pågående","diarienummer":"2022.237 KS","steps":[{"step_id":"ks-101-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2024-06-03","quote":"1. Planförslaget godkänns för samråd. 2. Detaljplanen medför inte en betydande miljöpåverkan.","decision":"bifall","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§101 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}}],"id":"a-2024-0030"},{"title":"Detaljplan för bostäder och förskola vid Smålandsgatan (fastigheten Förmannen 2), granskning","initiativ_typ":"styrelseforslag","initiators":[],"category":"infrastruktur","status":"pågående","diarienummer":"2021.121 KS","steps":[{"step_id":"ks-102-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2024-06-03","quote":"Planförslaget godkänns för granskning.","decision":"bifall","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§102 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}}],"id":"a-2024-0031"},{"title":"Uppföljning av Alingsås kommuns Riktlinjer för tjänsteresor år 2022-2023","initiativ_typ":"styrelseforslag","initiators":[],"category":"miljö-klimat","status":"avgjort","diarienummer":"2024.211 KS","steps":[{"step_id":"ks-103-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2024-06-03","quote":"Uppföljningen av Riktlinjer för tjänsteresor för förtroendevalda och tjänstepersoner godkänns.","decision":"bifall","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§103 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}}],"id":"a-2024-0032"},{"title":"Utredning - Bedriva kommunens lokalvård i egen regi","initiativ_typ":"styrelseforslag","initiators":[],"category":"ekonomi","status":"avgjort","diarienummer":"2023.118 KS","steps":[{"step_id":"ks-105-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2024-06-03","quote":"Ordföranden ställer förslagen mot varandra och finner att kommunstyrelsen beslutar att bifalla arbetsutskottets förslag till beslut.","decision":"bifall","voting":{"recorded":false,"note":"Röstfördelning ej redovisad i protokollet"},"reservations":[],"protocol_anteckning":[{"parties":["mp"],"quote":"Miljöpartiet anser att det vore fel av kommunen att ta tillbaka lokalvården till kommunal regi. En hemtagning av verksamheten bedöms bli fördyrande med uppskattningsvis 2-5 mnkr årligen. Det är pengar som Miljöpartiet anser att kommunen kan lägga på välfärden istället."},{"parties":["s"],"quote":"Lokalvården är sedan över ett decennium utlagd på entreprenad. Vi socialdemokrater motsatte oss det beslutet då och är fortsatt av principiell uppfattning att skattefinansierad verksamhet i regel ska bedrivas i egen regi. Det är idag dock inte försvarbart att återta verksamheten av främst organisatoriska och ekonomiska skäl."}],"source":{"protocol_ref":"§105 KOMMUNSTYRELSEN 2024-06-03","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2024-06-03/protocol/protokoll-kommunstyrelsen-2024-06-03pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2024-06-03/protokoll.pdf"}}],"id":"a-2024-0033"},{"title":"Val av tillfällig ordförande i kommunstyrelsen","initiativ_typ":"styrelseforslag","initiators":[],"category":"demokrati","status":"avgjort","diarienummer":"2025.048 KS","steps":[{"step_id":"ks-2025-01-27-s1-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-01-27","quote":"Kommunstyrelsen väljer Inger Carlborg (M) som tillfällig ordförande i kommunstyrelsen fram tills val kan förrättas i kommunfullmäktige.","decision":"bifall","voting":{"recorded":true,"question":"Val av tillfällig ordförande i kommunstyrelsen","result":{"ja":11,"nej":4,"avstar":0}},"reservations":[{"parties":["mp"],"quote":"Amanda Andersson (MP) reserverar sig mot beslutet."},{"parties":["c"],"quote":"Heidi Hankanen Ängberg (C) reserverar sig mot beslutet."},{"parties":["v"],"quote":"De båda tidigare kommunalråden har betett sig djupt kränkande och olämpligt på så många sätt. Det är dessutom tydligt att Simon Waern (S) och Daniel Filipsson (M) har haft ett alldeles för nära samarbete och bestämt saker utan insyn och utan att värna den demokratiska processen. Jag tycker därför det hade varit rimligt att Socialdemokraterna och Moderaterna tar ett steg tillbaka i det speciella läge som vi befinner oss i. Jag vill därför reservera mig mot beslutet att välja en tillfällig KSO från Moderaterna."}],"protocol_anteckning":[{"parties":["l"],"quote":"Det är nu viktigt att lägga all kraft på att upprätta förtroendet för kommunen i allmänhet och den politiska ledningen i synnerhet. I den uppkomna situationen bör Moderaterna och Socialdemokraterna ta ett steg tillbaka och den tillfälliga ledningen av kommunstyrelsen bör överlåtas till andra partier. Jag har därför valt att acceptera en nominering som tillfällig ordförande i kommunstyrelsen."}],"source":{"protocol_ref":"§1 KOMMUNSTYRELSEN 2025-01-27","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-01-27/protocol/protokoll-ks-2025-01-27pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-01-27/protokoll.pdf"}}],"id":"a-2025-0077"},{"title":"Val av tillfällig vice ordförande i kommunstyrelsen","initiativ_typ":"styrelseforslag","initiators":[],"category":"demokrati","status":"avgjort","diarienummer":"2025.049 KS","steps":[{"step_id":"ks-2025-01-27-s2-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-01-27","quote":"Kommunstyrelsen väljer Peter Norlander (S) som tillfällig vice ordförande i kommunstyrelsen fram tills val kan förrättas i kommunfullmäktige.","decision":"bifall","voting":{"recorded":true,"question":"Val av tillfällig vice ordförande i kommunstyrelsen","result":{"ja":11,"nej":4,"avstar":0}},"reservations":[{"parties":["mp"],"quote":"Amanda Andersson (MP) reserverar sig mot beslutet."},{"parties":["c"],"quote":"Heidi Hankanen Ängberg (C) reserverar sig mot beslutet."},{"parties":["v"],"quote":"Vi i Vänsterpartiet reserverar oss mot beslutet att välja en vice KSO från Socialdemokraterna då vi anser det lämpligt att i detta läge ta ett steg tillbaka, för att kommuninvånarna ska ha en chans att återfå förtroendet för den politiska ledningen."}],"protocol_anteckning":[],"source":{"protocol_ref":"§2 KOMMUNSTYRELSEN 2025-01-27","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-01-27/protocol/protokoll-ks-2025-01-27pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-01-27/protokoll.pdf"}}],"id":"a-2025-0078"},{"title":"Val av tillfällig firmatecknare för Alingsås kommun","initiativ_typ":"styrelseforslag","initiators":[],"category":"demokrati","status":"avgjort","diarienummer":"2025.050 KS","steps":[{"step_id":"ks-2025-01-27-s3-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-01-27","quote":"Till firmatecknare för Alingsås kommun från och med 27 januari 2025 väljs: Kommunstyrelsens tillfälliga ordförande Inger Carlborg (M), kommunstyrelsens tillfälliga vice ordförande Peter Norlander (S), kommundirektör Maria Standar och ekonomichef Simon Lindau.","decision":"bifall","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§3 KOMMUNSTYRELSEN 2025-01-27","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-01-27/protocol/protokoll-ks-2025-01-27pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-01-27/protokoll.pdf"}}],"id":"a-2025-0079"},{"title":"Val av tillfälliga ledamöter och ersättare i kommunstyrelsens arbetsutskott","initiativ_typ":"styrelseforslag","initiators":[],"category":"demokrati","status":"avgjort","diarienummer":"2025.055 KS","steps":[{"step_id":"ks-2025-01-27-s4-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-01-27","quote":"Kommunstyrelsen väljer Inger Carlborg (M) och Pamela Nilsson Ludvigsson (S) som tillfälliga ordinarie ledamöter i kommunstyrelsens arbetsutskott fram tills val kan förrättas i kommunfullmäktige.","decision":"bifall","voting":{"recorded":true,"question":"Val av tillfällig ordinarie ledamot (val 2): Pamela Nilsson Ludvigsson (S) eller Heidi Hankanen Ängberg (C)","result":{"ja":12,"nej":3,"avstar":0}},"reservations":[],"protocol_anteckning":[{"parties":["c"],"quote":"Det är av yttersta vikt att vi nu får transparens inom Alingsåspolitiken som under lång tid präglats av Firma Filipsson/Waern och deras maktspel. Centerpartiet ser ett stort värde i att fler partier får ökad insyn i de demokratiska processerna i kommunen genom en plats i Kommunstyrelsens arbetsutskott och kommer fortsätta arbeta för att möjliggöra detta."},{"parties":["v"],"quote":"Inför valet till tillfällig ledamot i KSAU framgick av praxis att det inte gick att nominera någon inom den valtekniska samverkan, vilket uteslöt att vi själva la fram ett eget förslag. Vi ställer oss dock bakom att det borde finnas någon ur oppositionen som sitter med i KSAU för att öka insynen varför vi hellre hade sett att det blev Heidi Hankanen Ängberg från Centerpartiet."}],"source":{"protocol_ref":"§4 KOMMUNSTYRELSEN 2025-01-27","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-01-27/protocol/protokoll-ks-2025-01-27pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-01-27/protokoll.pdf"}}],"id":"a-2025-0080"},{"title":"Initiativärende till kommunstyrelsen gällande frysning och utredning av eventuell utbetalning av omställningsstöd till kommunalråd - Peter Norlander (S) med flera","initiativ_typ":"initiativarende","initiators":[{"name":"Peter Norlander","party":"s"},{"name":"Anita Hedén Unosson","party":"s"},{"name":"Pamela Nilsson Ludvigsson","party":"s"},{"name":"Anders Julin","party":"s"},{"name":"Irene Jonsson","party":"s"}],"category":"demokrati","status":"avgjort","diarienummer":null,"steps":[{"step_id":"ks-2025-01-27-s5-vackt","instance":"kommunstyrelsen","type":"initiativarende_vackt","date":"2025-01-27","quote":"Peter Norlander (S), Anita Hedén Unosson (S), Pamela Nilsson Ludvigsson (S), Anders Julin (S) och Irene Jonsson (S) har till dagens sammanträde lämnat in ett förslag till kommunstyrelsen gällande frysning och utredning av eventuell utbetalning av omställningsstöd till kommunalråd.","decision":null,"voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§5 KOMMUNSTYRELSEN 2025-01-27","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-01-27/protocol/protokoll-ks-2025-01-27pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-01-27/protokoll.pdf"}},{"step_id":"ks-2025-01-27-s5-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-01-27","quote":"Kommunstyrelsen beslutar att: 1. avvakta med beslut och frysa eventuella utbetalningar av omställningsstöd tills dess klarhet finns gällande om det finns misstanke om brott i materialet.","decision":"bifall","voting":null,"reservations":[{"parties":["c","v"],"quote":"Centerpartiet och Vänsterpartiet kommer att rösta nej till begäran om ekonomisk ersättning från de före detta kommunalråden när ärendet behandlas på Kommunstyrelsens sammanträde. En eventuell utredning utifrån Sverigedemokraternas och Socialdemokraternas nämndinitiativ kommer inte ändra vår ståndpunkt. Vi röstar därför nej till nämndinitiativet."}],"protocol_anteckning":[],"source":{"protocol_ref":"§5 KOMMUNSTYRELSEN 2025-01-27","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-01-27/protocol/protokoll-ks-2025-01-27pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-01-27/protokoll.pdf"}}],"id":"a-2025-0081"},{"title":"Initiativärende till kommunstyrelsen gällande omställningsstöd för kommunalråd - Gunilla Gomér (SD) och Mats Bjelkemyr (SD)","initiativ_typ":"initiativarende","initiators":[{"name":"Gunilla Gomér","party":"sd"},{"name":"Mats Bjelkemyr","party":"sd"}],"category":"demokrati","status":"avgjort","diarienummer":null,"steps":[{"step_id":"ks-2025-01-27-s6-vackt","instance":"kommunstyrelsen","type":"initiativarende_vackt","date":"2025-01-27","quote":"Gunilla Gomér (SD) och Mats Bjelkemyr (SD) har till dagens sammanträde lämnat in ett förslag till ":"beslut","date":"2025-05-05","quote":"Revidering av lokala ordningsföreskrifter för torghandel i Alingsås kommun fastställs och ersätter tidigare lokala ordningsföreskrifter för torghandeln.","decision":"bifall","voting":null,"reservations":[{"parties":["c"],"quote":"Torghandeln bidrar till att göra Alingsås till en levande stad och skapar mötesplatser för både kommuninvånare och besökare. Centerpartiet föreslog att Daglig verksamhet, där personer med funktionsnedsättning får en meningsfull sysselsättning utefter sina behov, skulle ges möjlighet till en avgiftsfri plats för torghandel."}],"protocol_anteckning":[{"parties":["m"],"quote":"Tanken att även Daglig verksamhet får möjlighet till avgiftsfri plats för torghandel är vi positiva till. Men vi menar att detta bör sättas i ett större sammanhang där man tittar på om även andra verksamheter i kommunen bör få denna möjlighet. Lämpligtvis görs detta vid nästa revision av föreskriften."},{"parties":["s"],"quote":"Socialdemokraterna är i grunden positiva till centerpartiets yrkande om att kunna erbjuda avgiftsfri torghandelsplats till daglig verksamhet. Dock valde vi att ge ett medskick till förvaltningen att tills nästa revidering av riktlinjerna undersöka om det även finns andra målgrupper som skulle kunna erbjudas avgiftsfritt."}],"source":{"protocol_ref":"§79 KOMMUNSTYRELSEN 2025-05-05","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-05-05/protocol/protokoll-ks-2025-05-07pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-05-05/protokoll.pdf"}}],"id":"a-2025-0106"},{"title":"Lokala föreskrifter för att skydda människors hälsa och miljö","initiativ_typ":"styrelseforslag","initiators":[],"category":"miljö-klimat","status":"pågående","diarienummer":"2025.218 KS","steps":[{"step_id":"ks-80-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-05-05","quote":"Lokala föreskrifter för att skydda människors hälsa och n 3 mars 2025 lämnat ett initiativärende till kommunstyrelsen gällande en tilläggsbudget för att värna LSS-verksamheten.","decision":null,"voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§84 KOMMUNSTYRELSEN 2025-05-05","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-05-05/protocol/protokoll-ks-2025-05-07pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-05-05/protokoll.pdf"}},{"step_id":"ks-84-namndyttrande","instance":"kommunstyrelsen","type":"namndyttrande","date":"2025-05-05","quote":"Kommunledningskontoret anser därmed att initiativärendet ska avslås.","decision":"avstyrker","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§84 KOMMUNSTYRELSEN 2025-05-05","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-05-05/protocol/protokoll-ks-2025-05-07pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-05-05/protokoll.pdf"}},{"step_id":"ks-84-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-05-05","quote":"Initiativärendet avslås.","decision":"avslag","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§84 KOMMUNSTYRELSEN 2025-05-05","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-05-05/protocol/protokoll-ks-2025-05-07pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-05-05/protokoll.pdf"}}],"id":"a-2025-0110"},{"title":"Initiativärende till kommunstyrelsen gällande kameraövervakning på kommunens gymnasie- och högstadieskolor - Lady France Mulumba (KD)","initiativ_typ":"initiativarende","initiators":[{"name":"Lady France Mulumba","party":"kd"}],"category":"barn-utbildning","status":"avgjort","diarienummer":"2025.235 KS","steps":[{"step_id":"ks-85-initiativ-vackt","instance":"kommunstyrelsen","type":"initiativarende_vackt","date":"2025-04-06","quote":"Lady France Mulumba (KD) har den 6 april 2025, § 74 lämnat ett initiativärende till kommunstyrelsen gällande att utreda förutsättningarna för kameraövervakningen på kommunens gymnasie- och högstadieskolor.","decision":null,"voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§85 KOMMUNSTYRELSEN 2025-05-05","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-05-05/protocol/protokoll-ks-2025-05-07pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-05-05/protokoll.pdf"}},{"step_id":"ks-85-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-05-05","quote":"Kommunstyrelsen beslutar att avslå initiativärendet.","decision":"avslag","voting":null,"reservations":[],"protocol_anteckning":[{"parties":["kd"],"quote":"Kristdemokraterna jämkar sig med arbetsutskottets förslag till beslut och ser fram emot att i bred politisk förankring ta fram förslag i enlighet med ärendets intention i respektive ansvarig nämnd."},{"parties":["l"],"quote":"Kristdemokraterna har föreslagit att kommunledningskontoret ges i uppdrag att skyndsamt utreda förutsättningarna för kameraövervakning på kommunens gymnasie- och högstadieskolor. Frågan om kameraövervakning på skolor hör i första hand inte hemma i kommunstyrelsen utan i barn- och ungdomsnämnden respektive kultur- och utbildningsnämnden."},{"parties":["c"],"quote":"Det är skolans och ytterst huvudmannens ansvar att skapa trygghet för elever och personal. Centerpartiet anser att det är viktigt att kommunen som huvudman arbetar med trygghet i våra skolor ur ett brett perspektiv där närvarande vuxna, tillitsfulla relationer mellan lärare och elever, en välfungerande elevhälsa och ett aktivt värdegrundsarbete är centrala delar snarare än kameraövervakning."}],"source":{"protocol_ref":"§85 KOMMUNSTYRELSEN 2025-05-05","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-05-05/protocol/protokoll-ks-2025-05-07pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-05-05/protokoll.pdf"}}],"id":"a-2025-0111"},{"title":"Initiativärende till kommunstyrelsen gällande sänkta taxor i kommunen – Lady France Mulumba (KD)","initiativ_typ":"initiativarende","initiators":[{"name":"Lady France Mulumba","party":"kd"}],"category":"ekonomi","status":"avgjort","diarienummer":"2025.234 KS","steps":[{"step_id":"ks-86-initiativ-vackt","instance":"kommunstyrelsen","type":"initiativarende_vackt","date":"2025-04-06","quote":"Lady France Mulumba (KD) har den 6 april 2025, § 74 lämnat ett initiativärende till kommunstyrelsen gällande ohållbara matpriser.","decision":null,"voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§86 KOMMUNSTYRELSEN 2025-05-05","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-05-05/protocol/protokoll-ks-2025-05-07pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-05-05/protokoll.pdf"}},{"step_id":"ks-86-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-05-05","quote":"Kommunstyrelsen beslutar att avslå initiativärendet.","decision":"avslag","voting":null,"reservations":[],"protocol_anteckning":[{"parties":["kd"],"quote":"Kristdemokraterna jämkar sig med arbetsutskottets förslag till beslut och ser fram emot att ta fram nya rutiner och riktlinjer för upprättande och förändringar av taxor i samband med budgetarbetet, i syfte att skapa ett mer jämlikt, förutsägbart och kommunövergripande enhetligt arbetssätt kring kommunens taxor och avgifter."},{"parties":["l"],"quote":"Kristdemokraterna har föreslagit att kommunledningskontoret utreder möjligheterna att omgående sänka taxor för VA-tjänster samt hämtning och hantering av avfall. Man vill också ha förslag på andra taxor som skulle kunna sänkas."}]," artiet vill lyfta näringslivsrådet just för att det inte varit fokus och då det är oerhört viktigt att kommunen arbetar med att stödja och utveckla det lokala näringslivet."}],"source":{"protocol_ref":"§130 KOMMUNSTYRELSEN 2025-06-16","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-06-16/protocol/protokoll-skapad-ks-2025-06-23-130448pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-06-16/protokoll.pdf"}}],"id":"a-2025-0146"},{"title":"Bälinge företagspark – marktilldelning del av Bälinge 6:16, nr 1","initiativ_typ":"styrelseforslag","initiators":[],"category":"ekonomi","status":"avgjort","diarienummer":"2024.472 KS","steps":[{"step_id":"ks-131-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-06-16","quote":"Exploateringschef ges i uppdrag att underteckna markanvisningsavtal samt överlåtelsehandlingar med Mitmanwal 3 A AB för en del av fastigheten Bälinge 6:16.","decision":"bifall","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§131 KOMMUNSTYRELSEN 2025-06-16","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-06-16/protocol/protokoll-skapad-ks-2025-06-23-130448pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-06-16/protokoll.pdf"}}],"id":"a-2025-0147"},{"title":"Ansökan om investeringsbidrag gällande uppförande av nytt klubbhus - Linnefors Sportfiskeklubb","initiativ_typ":"styrelseforslag","initiators":[],"category":"övrigt","status":"avgjort","diarienummer":"2025.215 KS","steps":[{"step_id":"ks-132-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-06-16","quote":"Linnefors Sportfiskeklubb (org.nr. 867800–7884) beviljas ett investeringsbidrag om maximalt hälften av föreningens totala utgift för den investering som detta ärende avser, men maximalt 550 000 kronor, under förutsättning att föreningen ensamt eller tills rån regler för dygnsvila för personlig assistans.","decision":null,"voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§155 KOMMUNSTYRELSEN 2025-09-01","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-09-01/protocol/protokoll-ks-2025-09-01pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-09-01/protokoll.pdf"}},{"step_id":"ks-155-beredning","instance":"kommunstyrelsen","type":"beredning","date":"2025-05-05","quote":"Kommunstyrelsen beslutade den 5 maj 2025, § 87 att överlämna ärendet till kommunledningskontoret för beredning.","decision":null,"voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§155 KOMMUNSTYRELSEN 2025-09-01","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-09-01/protocol/protokoll-ks-2025-09-01pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-09-01/protokoll.pdf"}},{"step_id":"ks-155-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-09-01","quote":"Med 7 ja-röster och 8 nej-röster finner ordföranden att kommunstyrelsen beslutar att bifalla Anton Césars förslag till beslut.","decision":"bifall","voting":{"recorded":true,"question":"Ja-röst för bifall till arbetsutskottets förslag till beslut. Nej-röst för bifall till Anton Césars förslag till beslut.","result":{"ja":7,"nej":8,"avstar":0}},"reservations":[{"parties":["m","l","kd"],"quote":"Vi delar uppfattningen att brukarnas behov av trygghet, kontinuitet och god omsorg måste stå i centrum. Vi instämmer också i att personalens arbetssituation ska bestå av hållbara schemalösningar. Vi är därför i grunden positiva till att pröva längre arbetspass inom ramen för gällande lagstiftning, kollektivavtal och arbetsmiljöregler."}],"protocol_anteckning":[{"parties":["l"],"quote":"Kommunallagen ger en ledamot i en nämnd rätten att väcka ärende i nämnden. Detta motsvarar i någon mening rätten för ledamöter i kommunfullmäktige att lämna motioner, och ger ledamöterna möjligheten att få sina förslag prövade av respektive politiska organ."},{"parties":["s"],"quote":"Socialdemokraterna i kommunstyrelsen vill med denna protokollsanteckning redovisa vår ståndpunkt i ärendet. Vi står självklart bakom arbetstidslagstiftningen och parternas överenskommelser. Vår bedömning är dock att det, ur både medarbetar- och brukarperspektiv, finns starka skäl för Alingsås kommun att besluta om en generell avvikelse från reglerna om dygnsvila för personlig assistans, i likhet med många andra kommuner."}],"source":{"protocol_ref":"§155 KOMMUNSTYRELSEN 2025-09-01","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-09-01/protocol/protokoll-ks-2025-09-01pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-09-01/protokoll.pdf"}}],"id":"a-2025-0163"},{"title":"Förordnande av borgerliga vigselförrättare mandatperiod 2023-2026","initiativ_typ":"styrelseforslag","initiators":[],"category":"övrigt","status":"avgjort","diarienummer":"2022.423 KS","steps":[{"step_id":"ks-156-beslut","instance":"kommunstyrelsen","type":"beslut","date":"2025-09-01","quote":"Alingsås kommun föreslår att följande personer förordnas som borgerliga vigselförrättare under resterande mandatperiod 2023 - 2026.\n• Thomas Thim\n• Ulf Unosson","decision":"bifall","voting":null,"reservations":[],"protocol_anteckning":[],"source":{"protocol_ref":"§156 KOMMUNSTYRELSEN 2025-09-01","pdf_url":"https://sammantradesportal.alingsas.se/committees/kommunstyrelsen/mote-2025-09-01/protocol/protokoll-ks-2025-09-01pdf?downloadMode=open","archive_url":"git-pending:Knarrbyn/Kommundata-arkiv:data/raw/kommunstyrelsen/2025-09-01/protokoll.pdf"}}],"id":"a-2025-0164"},{"title":"Avsiktsförklaring Västra stambanan","initiativ_typ":"styrelseforslag","initiators":[],"category":"infrastruktur","status":"avgjort"," function partyPill(p){
  const color = PARTY_COLOR[p.party] || '#999';
  return `<span class="party-pill" style="cursor:pointer;" onclick="event.stopPropagation(); navigate('/parti/${p.party}')"><span class="dot" style="background:${color}"></span>${p.name} (${(p.party||'').toUpperCase()})</span>`;
}
function partyCodeLink(code){
  const color = PARTY_COLOR[code] || '#999';
  const name = PARTY_NAMES[code] || code.toUpperCase();
  return `<a class="party-pill" style="text-decoration:none;" onclick="event.stopPropagation(); navigate('/parti/${code}')"><span class="dot" style="background:${color}"></span>${name} (${code.toUpperCase()})</a>`;
}
function partiesLabel(parties){
  return parties.map(p => (PARTY_NAMES[p]||p) + ' (' + p.toUpperCase() + ')').join(', ');
}
function fmtDate(d){
  const months=['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  const [y,m,day]=d.split('-');
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}
function verifyStamp(){
  return `<span class="verify-stamp"><svg viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Verifierat ordagrant</span>`;
}
function typeTag(initiativTyp){
  const meta = INITIATIVE_TYPE_META[initiativTyp] || {label: initiativTyp, color:'#999'};
  return `<span class="type-tag" style="color:${meta.color}"><span class="swatch"></span>${meta.label}</span>`;
}

/**
 * Arkivlänk (spec §3: "dubbel länk vid varje citat"). Primärt arkiv är
 * numera git-historiken (se DECISION_LOG.md 2026-07-20) — archive_url är
 * antingen en riktig, commit-pinnad GitHub-permalänk, en PENDING-markör
 * ("git-pending:...", innan CI:s efterkomstskript hunnit fylla i den
 * riktiga länken), eller helt saknad. I de två sistnämnda fallen visas
 * INGEN länk alls — aldrig en trasig sådan (jfr det tidigare fyndet där
 * testfallens bokstavliga "TODO"-sträng annars skulle synts som en
 * klickbar länk i produktion).
 */
function renderArchiveLink(archiveUrl){
  if(!archiveUrl || archiveUrl.startsWith('git-pending:')) return '';
  return `<a href="${archiveUrl}" target="_blank" rel="noopener">Arkiverad kopia ↗</a>`;
}

function renderStep(step){
  let html = `<div class="step">
    <div class="step-head">
      <div class="step-instance"><a onclick="navigate('/namnd/${step.instance}')" style="color:inherit; text-decoration:underline; text-underline-offset:2px; cursor:pointer;">${INSTANCE_NAMES[step.instance]||step.instance}</a> — ${TYPE_NAMES[step.type]||step.type}</div>
      <div class="step-meta">${fmtDate(step.date)} · ${step.source.protocol_ref}</div>
    </div>`;

  if(step.decision){
    const cls = DECISION_CLASS[step.decision] || 'neutral';
    html += `<div class="decision-row"><span class="decision-tag ${cls}">${DECISION_NAMES[step.decision]||step.decision}</span></div>`;
  }

  html += `<div class="quote-block">
    <blockquote>${step.quote}</blockquote>
    <div class="verify-row">
      ${verifyStamp()}
      <div class="source-links">
        <a href="${step.source.pdf_url}" target="_blank" rel="noopener">Originalprotokoll ↗</a>
        ${renderArchiveLink(step.source.archive_url)}
      </div>
    </div>
  </div>`;

  if(step.voting === null){
    html += `<div class="no-decision-note">Leder inte till beslut eller omröstning (${TYPE_NAMES[step.type]||step.type}).</div>`;
  } else if(step.voting){
    if(step.voting.recorded){
      html += `<div class="voting-box">
        <div class="q">${step.voting.question||''}</div>
        <div class="voting-tally">
          <span class="ja">Ja <span class="n">${step.voting.result.ja}</span></span>
          <span class="nej">Nej <span class="n">${step.voting.result.nej}</span></span>
          <span class="avstar">Avstår <span class="n">${step.voting.result.avstar}</span></span>
        </div>
      </div>`;
    } else {
      html += `<div class="voting-box"><span class="voting-note">${step.voting.note}</span></div>`;
    }
  }

  (step.reservations||[]).forEach(r=>{
    html += `<div class="aside-block reservation"><span class="tag">Reservation — ${partiesLabel(r.parties)}</span><q>${r.quote}</q></div>`;
  });
  (step.protocol_anteckning||[]).forEach(a=>{
    html += `<div class="aside-block anteckning"><span class="tag">Protokollsanteckning — ${partiesLabel(a.parties)}</span><q>${a.quote}</q></div>`;
  });

  html += `</div>`;
  return html;
}

function renderCard(arende){
  const lastStep = arende.steps[arende.steps.length-1];
  const stampClass = arende.status === 'avgjort' ? 'avgjort' : 'pagaende';
  const stampLabel = arende.status === 'avgjort' ? 'Avgjort' : 'Pågående';
  const initiatorsHtml = arende.initiators.length
    ? arende.initiators.map(partyPill).join('')
    : `<span class="no-initiators">Förvaltningens eget förslag — inget enskilt parti</span>`;
  return `<a class="arende-card" onclick="navigate('/arende/${arende.id}')">
    <div class="card-top">
      <div class="eyebrow-row">
        <span class="eyebrow">${CATEGORY_NAMES[arende.category]||arende.category}</span>
        ${typeTag(arende.initiativ_typ)}
      </div>
      <span class="stamp ${stampClass}">${stampLabel}</span>
    </div>
    <h3>${arende.title}</h3>
    <div class="initiators">${initiatorsHtml}</div>
    <div class="meta-row">
      <span>${arende.steps.length} ${arende.steps.length===1?'steg':'steg'} i tidslinjen</span>
      <span>Senast: ${fmtDate(lastStep.date)}, ${INSTANCE_NAMES[lastStep.instance]||lastStep.instance}</span>
    </div>
  </a>`;
}

let activeFilter = {status:'alla', typ:'alla'};

function computeTypeCounts(){
  const counts = {};
  ARENDEN.forEach(a=>{ counts[a.initiativ_typ] = (counts[a.initiativ_typ]||0) + 1; });
  return counts;
}

function viewHome(){
  const total = ARENDEN.length;
  const quoteCount = ARENDEN.reduce((sum,a)=>sum+a.steps.reduce((s,st)=>{
    let c = st.quote?1:0;
    c += (st.reservations||[]).length;
    c += (st.protocol_anteckning||[]).length;
    return s+c;
  },0),0);

  const filtered = ARENDEN.filter(a =>
    (activeFilter.status==='alla' || a.status===activeFilter.status) &&
    (activeFilter.typ==='alla' || a.initiativ_typ===activeFilter.typ)
  );

  const typeCounts = computeTypeCounts();
  const typeOrder = ['motion','interpellation','initiativarende','styrelseforslag','enkel_fraga','medborgarforslag'];
  const typeButtons = typeOrder.filter(t=>typeCounts[t]).map(t=>{
    const meta = INITIATIVE_TYPE_META[t];
    return `<button data-t="${t}" class="${activeFilter.typ===t?'active':''}" onclick="setFilter('typ','${t}')">
      <span class="swatch" style="background:${meta.color}"></span>${meta.label} <span class="count">${typeCounts[t]}</span>
    </button>`;
  }).join('');

  return `
  <div class="hero">
    <h1>Varje politiskt ärende, spårat från motion till beslut — styrkt med ordagrant citat.</h1>
    <p class="lede">Faktagranskaren följer ärenden genom Alingsås kommuns beslutsprocess — inte bara motioner, utan alla initiativtyper: interpellationer, initiativärenden och nämndens/kommunstyrelsens egna förslag. Varje citat nedan är maskinellt verifierat mot det justerade protokollet, ordagrant.</p>
    <div class="method-strip">
      <div class="cell"><span class="num">${total}</span><span class="label">Bevakade ärenden</span></div>
      <div class="cell"><span class="num">${quoteCount}</span><span class="label">Verifierade citat</span></div>
      <div class="cell"><span class="num">100%</span><span class="label">Ordagrant styrkta mot original</span></div>
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-group-label">Partier</span>
    <div class="filters">
      ${Object.keys(PARTY_NAMES).map(code=>{
        const color = PARTY_COLOR[code];
        return `<button onclick="navigate('/parti/${code}')"><span class="swatch" style="background:${color}"></span>${code.toUpperCase()}</button>`;
      }).join('')}
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-group-label">Status</span>
    <div class="filters">
      <button data-f="alla" class="${activeFilter.status==='alla'?'active':''}" onclick="setFilter('status','alla')">Alla ärenden</button>
      <button data-f="pågående" class="${activeFilter.status==='pågående'?'active':''}" onclick="setFilter('status','pågående')">Pågående</button>
      <button data-f="avgjort" class="${activeFilter.status==='avgjort'?'active':''}" onclick="setFilter('status','avgjort')">Avgjorda</button>
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-group-label">Initiativtyp</span>
    <div class="filters">
      <button data-t="alla" class="${activeFilter.typ==='alla'?'active':''}" onclick="setFilter('typ','alla')">Alla typer</button>
      ${typeButtons}
    </div>
    <div class="filter-note">Motion, interpellation och initiativärende kan väckas av vilken ledamot som helst — i praktiken oppositionens huvudverktyg för att granska majoriteten. Styrelseförslag kommer istället direkt från nämnd/kommunstyrelse och utgör merparten av en vanlig dagordning. Filtrera för att se dem separat.</div>
  </div>

  <div class="arende-list">
    ${filtered.length ? filtered.map(renderCard).join('') : '<div class="empty-note">Inga ärenden matchar filtret.</div>'}
  </div>`;
}

function viewArende(id){
  const arende = ARENDEN.find(a=>a.id===id);
  if(!arende) return `<div class="empty-note">Ärendet kunde inte hittas.</div>`;
  const stampClass = arende.status === 'avgjort' ? 'avgjort' : 'pagaende';
  const stampLabel = arende.status === 'avgjort' ? 'Avgjort' : 'Pågående';
  const initiatorsHtml = arende.initiators.length
    ? arende.initiators.map(partyPill).join('')
    : `<span class="no-initiators">Förvaltningens eget förslag — inget enskilt parti</span>`;
  return `
  <a class="back-link" onclick="navigate('/')">← Alla ärenden</a>
  <div class="detail-head">
    <div class="eyebrow-row" style="margin-bottom:6px;">
      <span class="eyebrow">${CATEGORY_NAMES[arende.category]||arende.category}</span>
      ${typeTag(arende.initiativ_typ)}
    </div>
    <h1>${arende.title}</h1>
    <div class="detail-meta">
      ${initiatorsHtml}
      <span class="stamp ${stampClass}">${stampLabel}</span>
    </div>
  </div>
  <div class="timeline">
    ${arende.steps.map(renderStep).join('')}
  </div>`;
}

function viewParti(kod){
  const name = PARTY_NAMES[kod];
  if(!name){
    return `<a class="back-link" onclick="navigate('/')">← Alla ärenden</a><div class="empty-note">Okänd partikod "${kod}".</div>`;
  }
  const color = PARTY_COLOR[kod];

  const initiated = ARENDEN.filter(a => a.initiators.some(i=>i.party===kod));

  const reservationEntries = [];
  const anteckningEntries = [];
  const votingEntries = [];
  ARENDEN.forEach(a=>{
    a.steps.forEach(step=>{
      (step.reservations||[]).forEach(r=>{
        if(r.parties.includes(kod)) reservationEntries.push({arende:a, step, item:r});
      });
      (step.protocol_anteckning||[]).forEach(x=>{
        if(x.parties.includes(kod)) anteckningEntries.push({arende:a, step, item:x});
      });
      if(step.voting && step.voting.recorded && step.voting.by_party && step.voting.by_party[kod]){
        votingEntries.push({arende:a, step, vote: step.voting.by_party[kod]});
      }
    });
  });

  const hasNothing = !initiated.length && !reservationEntries.length && !anteckningEntries.length && !votingEntries.length;

  let html = `
  <a class="back-link" onclick="navigate('/')">← Alla ärenden</a>
  <div class="detail-head">
    <div class="eyebrow-row" style="margin-bottom:6px;">
      <span class="type-tag" style="color:${color}"><span class="swatch"></span>Parti</span>
    </div>
    <h1>${name} <span style="color:var(--ink-faint); font-size:0.6em;">(${kod.toUpperCase()})</span></h1>
    <p style="color:var(--ink-soft); max-width:56ch; margin-top:6px;">Allt registrerat för ${name} i testdatan: väckta ärenden, reservationer och protokollsanteckningar. Samma verifieringsmetod som för alla andra partier.</p>
  </div>`;

  if(hasNothing){
    html += `<div class="empty-note">Inget registrerat för ${name} i den här testdatan ännu — det säger inget om partiets faktiska aktivitet, bara att inget av de nio granskade ärendena råkar beröra dem.</div>`;
    return html;
  }

  if(initiated.length){
    html += `<h3 style="font-family:'Fraunces',serif; font-size:1.15rem; margin:28px 0 12px;">Väckta ärenden (${initiated.length})</h3><div class="arende-list">`;
    html += initiated.map(renderCard).join('');
    html += `</div>`;
  }

  if(reservationEntries.length){
    html += `<h3 style="font-family:'Fraunces',serif; font-size:1.15rem; margin:28px 0 12px;">Reservationer (${reservationEntries.length})</h3>`;
    reservationEntries.forEach(e=>{
      html += `<div class="aside-block reservation">
        <span class="tag">${e.arende.title} — ${INSTANCE_NAMES[e.step.instance]||e.step.instance}, ${fmtDate(e.step.date)}</span>
        <q>${e.item.quote}</q><br>
        <a href="#/arende/${e.arende.id}" class="ui" style="font-size:0.76rem; text-decoration:underline;">Visa ärendet →</a>
      </div>`;
    });
  }

  if(anteckningEntries.length){
    html += `<h3 style="font-family:'Fraunces',serif; font-size:1.15rem; margin:28px 0 12px;">Protokollsanteckningar (${anteckningEntries.length})</h3>`;
    anteckningEntries.forEach(e=>{
      html += `<div class="aside-block anteckning">
        <span class="tag">${e.arende.title} — ${INSTANCE_NAMES[e.step.instance]||e.step.instance}, ${fmtDate(e.step.date)}</span>
        <q>${e.item.quote}</q><br>
        <a href="#/arende/${e.arende.id}" class="ui" style="font-size:0.76rem; text-decoration:underline;">Visa ärendet →</a>
      </div>`;
    });
  }

  return html;
}

function viewNamnd(slug){
  const name = INSTANCE_NAMES[slug];
  if(!name){
    return `<a class="back-link" onclick="navigate('/')">← Alla ärenden</a><div class="empty-note">Okänd instans "${slug}".</div>`;
  }
  const involved = ARENDEN.filter(a => a.steps.some(s=>s.instance===slug));

  let html = `
  <a class="back-link" onclick="navigate('/')">← Alla ärenden</a>
  <div class="detail-head">
    <div class="eyebrow-row" style="margin-bottom:6px;"><span class="eyebrow">Nämnd/instans</span></div>
    <h1>${name}</h1>
    <p style="color:var(--ink-soft); max-width:56ch; margin-top:6px;">Alla ärenden med minst ett steg hos ${name} — motioner, yttranden, beslut och övriga initiativtyper, med samma verifieringsmetod som för resten av sajten.</p>
  </div>`;

  if(!involved.length){
    html += `<div class="empty-note">Inga ärenden registrerade hos ${name} ännu — det säger inget om nämndens faktiska aktivitet, bara att inget av de hittills granskade ärendena råkar beröra den.</div>`;
    return html;
  }

  html += `<div class="arende-list">${involved.map(renderCard).join('')}</div>`;
  return html;
}

let sokQuery = '';
let sokFilter = { namnd: 'alla', status: 'alla' };

function matchesSok(a, q){
  if(sokFilter.namnd!=='alla' && !a.steps.some(s=>s.instance===sokFilter.namnd)) return false;
  if(sokFilter.status!=='alla' && a.status!==sokFilter.status) return false;
  if(!q) return true;
  if(a.title.toLowerCase().includes(q)) return true;
  return a.steps.some(s =>
    (s.quote||'').toLowerCase().includes(q) ||
    (s.reservations||[]).some(r=>(r.quote||'').toLowerCase().includes(q)) ||
    (s.protocol_anteckning||[]).some(x=>(x.quote||'').toLowerCase().includes(q))
  );
}

function renderSokResults(){
  const q = sokQuery.trim().toLowerCase();
  const results = ARENDEN.filter(a=>matchesSok(a,q));
  if(!results.length) return '<div class="empty-note">Inga ärenden matchar sökningen.</div>';
  return results.map(renderCard).join('');
}

function handleSokInput(value){
  // Uppdaterar bara resultatlistan, inte hela sidan — annars tappar
  // sökfältet fokus (och markörens position) vid varje tangenttryckning,
  // eftersom render() annars skriver om hela app.innerHTML.
  sokQuery = value;
  const el = document.getElementById('sok-results');
  if(el) el.innerHTML = renderSokResults();
}

function setSokFilter(axis, value){
  sokFilter[axis] = value;
  render();
}

function viewSok(){
  const namndButtons = Object.keys(INSTANCE_NAMES).map(slug=>
    `<button class="${sokFilter.namnd===slug?'active':''}" onclick="setSokFilter('namnd','${slug}')">${INSTANCE_NAMES[slug]}</button>`
  ).join('');

  return `
  <div class="hero" style="border-bottom:none; padding-bottom:0;">
    <h1>Sök i ärenden</h1>
    <p class="lede">Fritextsök i titlar och citat, kombinerat med filter för nämnd/instans och status.</p>
  </div>

  <div class="filter-group">
    <input type="search" id="sok-input" placeholder="Sök på ord i titel eller citat…" value="${sokQuery.replace(/"/g,'&quot;')}"
      oninput="handleSokInput(this.value)"
      style="width:100%; max-width:480px; padding:10px 14px; border:1px solid var(--line); border-radius:8px; font-size:0.95rem; font-family:inherit; background:var(--paper);">
  </div>

  <div class="filter-group">
    <span class="filter-group-label">Nämnd/instans</span>
    <div class="filters">
      <button class="${sokFilter.namnd==='alla'?'active':''}" onclick="setSokFilter('namnd','alla')">Alla instanser</button>
      ${namndButtons}
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-group-label">Status</span>
    <div class="filters">
      <button class="${sokFilter.status==='alla'?'active':''}" onclick="setSokFilter('status','alla')">Alla ärenden</button>
      <button class="${sokFilter.status==='pågående'?'active':''}" onclick="setSokFilter('status','pågående')">Pågående</button>
      <button class="${sokFilter.status==='avgjort'?'active':''}" onclick="setSokFilter('status','avgjort')">Avgjorda</button>
    </div>
  </div>

  <div id="sok-results" class="arende-list">
    ${renderSokResults()}
  </div>`;
}

function viewMetod(){
  return `
  <div class="hero" style="border-bottom:none; padding-bottom:0;">
    <h1>Hur verifieringen fungerar</h1>
    <p class="lede">Faktagranskaren bygger på principen "sten kan inte hackas": en helt statisk publik yta utan skrivbar server. All bearbetning sker i en isolerad pipeline som körs veckovis.</p>
  </div>
  <div style="max-width:64ch; font-size:1rem; color:var(--ink-soft);">
    <p><strong style="color:var(--ink)">1. Källa → pipeline → publikt.</strong> Protokoll hämtas från kommunens öppna sammanträdesportal. En AI-modell strukturerar rådata till kandidatposter med citat, beslut, initiativtyp och röstutfall.</p>
    <p><strong style="color:var(--ink)">2. Verbatimgrinden.</strong> Varje citat kontrolleras i ren kod — inte av AI:n själv — mot den faktiska, extraherade protokolltexten. Whitespace normaliseras, men texten måste vara exakt likadan. Klarar citatet inte grinden publiceras det aldrig, oavsett vad AI:n påstår.</p>
    <p><strong style="color:var(--ink)">3. Oberoende AI-granskning.</strong> En andra AI-modell kontrollerar extraktionen innan publicering, med en egen, annorlunda utformad prompt som aktivt letar fel snarare än att bekräfta. Vid oenighet går ärendet till manuell granskning. <em>(För närvarande avstängt i väntan på en andra modellleverantör — verbatimgrinden i steg 2 är opåverkad av detta och gäller alltid.)</em></p>
    <p><strong style="color:var(--ink)">4. Källarkivering via git.</strong> Varje nedladdat protokoll committas till den offentliga git-historiken tillsammans med resten av datan. En commit-pinnad länk fungerar som arkiverad kopia — om originalet hos kommunen senare ändras eller tas bort finns beviset kvar i repots egen, omanipulerbara historik. Inget beroende av en extern tredje part.</p>
    <p><strong style="color:var(--ink)">5. Git som databas.</strong> All data lever som versionerade filer, aldrig i en dold databas. Hela historiken är offentlig och granskbar.</p>
    <p><strong style="color:var(--ink)">6. Alla initiativtyper, inte bara motioner.</strong> Motion, interpellation, enkel fråga, medborgarförslag, initiativärende och nämndens/kommunstyrelsens egna förslag bevakas med identisk metod. En tjänst som bara visade motioner skulle osynliggöra merparten av majoritetens faktiska beslutsfattande.</p>
  </div>`;
}

function viewOm(){
  return `
  <div class="hero" style="border-bottom:none; padding-bottom:0;">
    <h1>Om Faktagranskaren</h1>
    <p class="lede">En oberoende, källspårad tjänst som följer politiska ärenden i Alingsås kommun genom hela deras resa — från motion, interpellation eller initiativärende till beslut.</p>
  </div>
  <div style="max-width:64ch; font-size:1rem; color:var(--ink-soft);">
    <p><strong style="color:var(--ink)">Neutralitetslöfte.</strong> Identisk metod och samma verifieringsgrindar tillämpas för alla partier och alla initiativtyper — motioner lika noggrant som styrelseförslag, oavsett vem som bygger eller driftar tjänsten.</p>
    <p><strong style="color:var(--ink)">Inga fristående uttalanden.</strong> Endast citat kopplade till ett formellt ärende på en instans dagordning publiceras. Inga lösryckta citat från insändare eller pressutspel.</p>
    <p><strong style="color:var(--ink)">Rättelser.</strong> Fel rättas synligt, aldrig i tysthet.</p>
    <p>Skapad av <strong style="color:var(--ink)">Tankesmedjan Mjörninstitutet</strong>.</p>
  </div>`;
}

function parseRoute(){
  const hash = location.hash.replace(/^#/, '') || '/';
  return hash;
}
function render(){
  const route = parseRoute();
  const app = document.getElementById('app');
  document.querySelectorAll('nav.site a').forEach(a=>a.classList.remove('active'));

  if(route.startsWith('/arende/')){
    const id = route.split('/arende/')[1];
    app.innerHTML = viewArende(id);
  } else if(route.startsWith('/parti/')){
    const kod = route.split('/parti/')[1];
    app.innerHTML = viewParti(kod);
  } else if(route.startsWith('/namnd/')){
    const slug = route.split('/namnd/')[1];
    app.innerHTML = viewNamnd(slug);
  } else if(route === '/sok'){
    app.innerHTML = viewSok();
    document.querySelector('nav.site a[data-route="/sok"]').classList.add('active');
  } else if(route === '/metod'){
    app.innerHTML = viewMetod();
    document.querySelector('nav.site a[data-route="/metod"]').classList.add('active');
  } else if(route === '/om'){
    app.innerHTML = viewOm();
    document.querySelector('nav.site a[data-route="/om"]').classList.add('active');
  } else {
    app.innerHTML = viewHome();
    document.querySelector('nav.site a[data-route="/"]').classList.add('active');
  }
  window.scrollTo({top:0});
}
function navigate(path){
  location.hash = path;
}
function setFilter(axis, value){
  activeFilter[axis] = value;
  render();
}
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
